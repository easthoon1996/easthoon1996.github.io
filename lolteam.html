<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쥬니워커 칼바람 내전 팀 짜기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        body { 
            font-family: 'Noto Sans KR', system-ui, sans-serif; 
        }
        .team-red {
            background: linear-gradient(135deg, #7f1d1d, #991b1b);
        }
        .team-blue {
            background: linear-gradient(135deg, #1e3a8a, #1e40af);
        }
        .input-area {
            background: #111827;
        }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen py-8">
    <div class="max-w-4xl mx-auto px-6">
        <!-- 헤더 -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 bg-gray-900 px-8 py-4 rounded-3xl border border-gray-700 mb-6">
                <span class="text-4xl">🏹</span>
                <h1 class="text-4xl font-bold tracking-tighter">쥬니워커 칼바람 내전</h1>
                <span class="text-4xl">⚔️</span>
            </div>
            <p class="text-gray-400 text-xl">6명 ~ 10명 자유롭게 넣고 → 자동으로 레드팀 / 블루팀 분배</p>
            <p class="text-xs text-gray-500 mt-2">한 줄에 한 명씩 이름 붙여넣기만 하면 됩니다!</p>
        </div>

        <div class="bg-gray-900 rounded-3xl shadow-2xl overflow-hidden">
            <!-- 입력 영역 -->
            <div class="p-8 input-area">
                <div class="flex justify-between items-baseline mb-4">
                    <label class="text-lg font-medium flex items-center gap-2">
                        <span>👥</span>
                        플레이어 이름 입력
                    </label>
                    <div class="text-sm text-gray-400 flex items-center gap-1">
                        <span id="nameCount" class="font-mono bg-gray-800 px-3 py-1 rounded-2xl">0명</span>
                        <span class="text-red-400">6~10명 추천</span>
                    </div>
                </div>
                
                <textarea id="playersTextarea" 
                    rows="10"
                    class="w-full bg-gray-800 border-2 border-gray-700 focus:border-blue-500 rounded-2xl p-6 text-lg placeholder-gray-400 resize-none focus:outline-none"
                    placeholder="홍길동&#10;김철수&#10;박영희&#10;이민준&#10;최지은&#10;...&#10;&#10;한 줄에 한 명씩 입력하세요!"></textarea>

                <div class="mt-6 flex gap-4">
                    <button onclick="makeTeams()" 
                            class="flex-1 bg-gradient-to-r from-blue-600 to-red-600 hover:from-blue-500 hover:to-red-500 text-white font-bold text-xl py-5 rounded-2xl shadow-lg flex items-center justify-center gap-3 transition-all active:scale-95">
                        <span class="text-3xl">🎲</span>
                        랜덤 팀 분배하기
                    </button>
                    
                    <button onclick="clearTextarea()" 
                            class="px-8 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-2xl font-medium transition-all">
                        초기화
                    </button>
                </div>
            </div>

            <!-- 결과 영역 -->
            <div id="resultArea" class="hidden p-8 border-t border-gray-700">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-3xl font-bold flex items-center gap-3">
                        <span>🏆</span> 팀 배정 완료!
                    </h2>
                    <button onclick="makeTeams()" 
                            class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 px-6 py-3 rounded-2xl font-medium text-lg transition-all">
                        <span>🔄 다시 섞기</span>
                    </button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- 레드팀 -->
                    <div id="redTeam" class="team-red rounded-3xl p-8 shadow-2xl">
                        <div class="flex justify-between mb-6">
                            <div class="flex items-center gap-3 text-3xl font-bold">
                                🔴 <span>레드팀</span>
                            </div>
                            <div id="redCount" class="text-6xl font-bold text-white/90 font-mono"></div>
                        </div>
                        <ul id="redList" class="space-y-4"></ul>
                    </div>

                    <!-- 블루팀 -->
                    <div id="blueTeam" class="team-blue rounded-3xl p-8 shadow-2xl">
                        <div class="flex justify-between mb-6">
                            <div class="flex items-center gap-3 text-3xl font-bold">
                                🔵 <span>블루팀</span>
                            </div>
                            <div id="blueCount" class="text-6xl font-bold text-white/90 font-mono"></div>
                        </div>
                        <ul id="blueList" class="space-y-4"></ul>
                    </div>
                </div>

                <div class="text-center mt-10 text-gray-400">
                    총 <span id="totalCount" class="font-bold text-white text-2xl"></span>명 • 공평하게 분배됐습니다
                </div>
            </div>
        </div>

        <div class="text-center text-xs text-gray-500 mt-8">
            <a href="https://discord.gg/sv4DCSJ3">쥬니워커 디스코드</a>
        </div>
    </div>

    <script>
        // Tailwind 초기화
        function initTailwind() {
            tailwind.config = {
                content: [],
                theme: { extend: {} }
            }
        }

        // 배열 섞기 (Fisher-Yates)
        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // 팀 분배 실행
        function makeTeams() {
            const textarea = document.getElementById('playersTextarea');
            let names = textarea.value
                .split('\n')
                .map(name => name.trim())
                .filter(name => name.length > 0);

            // 최소 6명 체크 (요청사항)
            if (names.length < 6) {
                alert('⚠️ 최소 6명 이상 입력해주세요!\n\n현재 ' + names.length + '명만 입력됐어요.');
                return;
            }
            if (names.length > 10) {
                alert('최대 10명까지 지원합니다.');
                return;
            }

            // 섞기
            const shuffled = shuffle(names);
            const total = shuffled.length;
            
            // 균등 분배 (홀수일 경우 한 팀에 +1)
            const redSize = Math.floor(total / 2);
            const blueSize = total - redSize;

            const redTeam = shuffled.slice(0, redSize);
            const blueTeam = shuffled.slice(redSize);

            // 결과 영역 표시
            document.getElementById('resultArea').classList.remove('hidden');

            // 레드팀 렌더링
            document.getElementById('redCount').textContent = redSize;
            const redListHTML = redTeam.map((name, index) => `
                <li class="flex items-center gap-4 bg-white/10 hover:bg-white/20 rounded-2xl px-6 py-4 transition-all">
                    <span class="font-mono text-red-200 text-xl w-8">${index + 1}</span>
                    <span class="text-xl font-medium">${name}</span>
                </li>
            `).join('');
            document.getElementById('redList').innerHTML = redListHTML;

            // 블루팀 렌더링
            document.getElementById('blueCount').textContent = blueSize;
            const blueListHTML = blueTeam.map((name, index) => `
                <li class="flex items-center gap-4 bg-white/10 hover:bg-white/20 rounded-2xl px-6 py-4 transition-all">
                    <span class="font-mono text-blue-200 text-xl w-8">${index + 1}</span>
                    <span class="text-xl font-medium">${name}</span>
                </li>
            `).join('');
            document.getElementById('blueList').innerHTML = blueListHTML;

            // 총 인원 표시
            document.getElementById('totalCount').textContent = total;

            // 실시간 카운트 업데이트
            updateNameCount();
        }

        // 입력된 이름 실시간 카운트
        function updateNameCount() {
            const textarea = document.getElementById('playersTextarea');
            const count = textarea.value
                .split('\n')
                .map(name => name.trim())
                .filter(name => name.length > 0).length;
            document.getElementById('nameCount').textContent = count + '명';
        }

        // 초기화
        function clearTextarea() {
            document.getElementById('playersTextarea').value = '';
            document.getElementById('resultArea').classList.add('hidden');
            updateNameCount();
        }

        // 페이지 로드 시 초기화
        window.onload = function() {
            initTailwind();
            const textarea = document.getElementById('playersTextarea');
            
            // 입력할 때마다 카운트 업데이트
            textarea.addEventListener('input', updateNameCount);
            
            // 예시 이름 자동 채우기 (처음 사용자를 위해)
            // textarea.value = '김철수\n이영희\n박민준\n최지은\n정수호\n강다은\n윤서준\n한지민\n오민석\n송하윤';
            // updateNameCount();
            
            console.log('%c✅ 롤 칼바람 팀 짜기 HTML 로드 완료!', 'color:#22d3ee; font-size:14px; font-weight:bold');
        };
    </script>
</body>
</html>
