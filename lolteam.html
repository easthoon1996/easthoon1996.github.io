<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 나누기 - A vs B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-8">
    <div class="max-w-4xl mx-auto px-4">
        <!-- 헤더 -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 bg-white shadow-md px-8 py-4 rounded-3xl mb-6">
                <span class="text-5xl">⚽</span>
                <h1 class="text-5xl font-bold text-gray-800 tracking-tighter">쥬니워커 랜덤 팀 나누기</h1>
                <span class="text-5xl">🏀</span>
            </div>
        </div>

        <!-- 입력 영역 -->
        <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-10 mb-10">
            <h2 class="text-2xl font-semibold mb-6 text-gray-700 flex items-center gap-2">
                👥 참가자 10명 입력
                <span class="text-sm bg-amber-100 text-amber-700 px-3 py-1 rounded-2xl font-medium">정확히 10명</span>
            </h2>
            
            <!-- 입력창을 JS가 아니라 HTML에 직접 넣음 (안정성 ↑) -->
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <div class="flex flex-col">
                    <label class="text-sm font-medium text-gray-500 mb-1">참가자 1</label>
                    <input type="text" id="name1" class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-indigo-500 text-lg placeholder-gray-400 transition-all" placeholder="이름">
                </div>
                <div class="flex flex-col">
                    <label class="text-sm font-medium text-gray-500 mb-1">참가자 2</label>
                    <input type="text" id="name2" class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-indigo-500 text-lg placeholder-gray-400 transition-all" placeholder="이름">
                </div>
                <div class="flex flex-col">
                    <label class="text-sm font-medium text-gray-500 mb-1">참가자 3</label>
                    <input type="text" id="name3" class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-indigo-500 text-lg placeholder-gray-400 transition-all" placeholder="이름">
                </div>
                <div class="flex flex-col">
                    <label class="text-sm font-medium text-gray-500 mb-1">참가자 4</label>
                    <input type="text" id="name4" class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-indigo-500 text-lg placeholder-gray-400 transition-all" placeholder="이름">
                </div>
                <div class="flex flex-col">
                    <label class="text-sm font-medium text-gray-500 mb-1">참가자 5</label>
                    <input type="text" id="name5" class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-indigo-500 text-lg placeholder-gray-400 transition-all" placeholder="이름">
                </div>
                <div class="flex flex-col">
                    <label class="text-sm font-medium text-gray-500 mb-1">참가자 6</label>
                    <input type="text" id="name6" class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-indigo-500 text-lg placeholder-gray-400 transition-all" placeholder="이름">
                </div>
                <div class="flex flex-col">
                    <label class="text-sm font-medium text-gray-500 mb-1">참가자 7</label>
                    <input type="text" id="name7" class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-indigo-500 text-lg placeholder-gray-400 transition-all" placeholder="이름">
                </div>
                <div class="flex flex-col">
                    <label class="text-sm font-medium text-gray-500 mb-1">참가자 8</label>
                    <input type="text" id="name8" class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-indigo-500 text-lg placeholder-gray-400 transition-all" placeholder="이름">
                </div>
                <div class="flex flex-col">
                    <label class="text-sm font-medium text-gray-500 mb-1">참가자 9</label>
                    <input type="text" id="name9" class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-indigo-500 text-lg placeholder-gray-400 transition-all" placeholder="이름">
                </div>
                <div class="flex flex-col">
                    <label class="text-sm font-medium text-gray-500 mb-1">참가자 10</label>
                    <input type="text" id="name10" class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-indigo-500 text-lg placeholder-gray-400 transition-all" placeholder="이름">
                </div>
            </div>

            <div class="mt-8 flex justify-center">
                <button onclick="divideTeams()" 
                        class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white px-14 py-5 rounded-3xl text-2xl font-bold shadow-lg hover:shadow-2xl transition-all active:scale-95 flex items-center gap-4">
                    <span>🎲</span>
                    <span>팀 무작위 배정하기</span>
                    <span>🎲</span>
                </button>
            </div>
        </div>

        <!-- 결과 영역 -->
        <div id="result" class="hidden mt-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- A팀 -->
                <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-blue-500">
                    <div class="bg-blue-600 text-white p-6 flex items-center justify-between">
                        <h2 class="text-4xl font-bold">TEAM A</h2>
                        <div class="bg-white/20 text-white text-sm font-mono px-5 py-2 rounded-3xl">5명</div>
                    </div>
                    <div class="p-8" id="teamA"></div>
                </div>

                <!-- B팀 -->
                <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-red-500">
                    <div class="bg-red-600 text-white p-6 flex items-center justify-between">
                        <h2 class="text-4xl font-bold">TEAM B</h2>
                        <div class="bg-white/20 text-white text-sm font-mono px-5 py-2 rounded-3xl">5명</div>
                    </div>
                    <div class="p-8" id="teamB"></div>
                </div>
            </div>

            <!-- 하단 버튼 -->
            <div class="flex flex-wrap justify-center gap-4 mt-10">
                <button onclick="divideTeams()" 
                        class="bg-gray-800 hover:bg-gray-900 text-white px-8 py-4 rounded-3xl font-medium flex items-center gap-2 text-lg">
                    🔄 다시 섞기
                </button>
                
                <button onclick="copyToClipboard()" 
                        class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-4 rounded-3xl font-medium flex items-center gap-2 text-lg">
                    📋 결과 복사하기
                </button>
                
                <button onclick="resetAll()" 
                        class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-8 py-4 rounded-3xl font-medium flex items-center gap-2 text-lg">
                    🗑 처음부터 다시
                </button>
            </div>
        </div>
    </div>

    <script>
        // Fisher-Yates 셔플 (완전 랜덤)
        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // 팀 나누기 메인 함수
        function divideTeams() {
            const names = [];
            
            // 10개 입력값 수집
            for (let i = 1; i <= 10; i++) {
                const input = document.getElementById(`name${i}`);
                const value = input.value.trim();
                names.push(value || `참가자 ${i}`);
            }
            
            // 모두 비어있을 경우 경고
            if (names.every(name => name.startsWith('참가자'))) {
                if (!confirm('모든 이름이 비어있네요!\n기본 이름으로 진행할까요?')) {
                    return;
                }
            }
            
            // 랜덤 섞기
            const shuffled = shuffle(names);
            
            // 5명씩 나누기
            const teamA = shuffled.slice(0, 5);
            const teamB = shuffled.slice(5, 10);
            
            // 결과 표시
            displayResults(teamA, teamB);
            
            // 결과 영역 보이기
            const resultSection = document.getElementById('result');
            resultSection.classList.remove('hidden');
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }

        // 결과 HTML 생성
        function displayResults(teamA, teamB) {
            const teamAContainer = document.getElementById('teamA');
            const teamBContainer = document.getElementById('teamB');
            
            // A팀
            teamAContainer.innerHTML = `
                <div class="space-y-4">
                    ${teamA.map((name, index) => `
                        <div class="flex items-center gap-4 bg-blue-50 rounded-3xl px-6 py-5">
                            <div class="w-9 h-9 bg-blue-600 text-white rounded-2xl flex items-center justify-center font-bold text-xl flex-shrink-0">${index + 1}</div>
                            <div class="text-2xl font-medium text-gray-800">${name}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            // B팀
            teamBContainer.innerHTML = `
                <div class="space-y-4">
                    ${teamB.map((name, index) => `
                        <div class="flex items-center gap-4 bg-red-50 rounded-3xl px-6 py-5">
                            <div class="w-9 h-9 bg-red-600 text-white rounded-2xl flex items-center justify-center font-bold text-xl flex-shrink-0">${index + 1}</div>
                            <div class="text-2xl font-medium text-gray-800">${name}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // 결과 클립보드 복사
        function copyToClipboard() {
            const teamAContainer = document.getElementById('teamA');
            const teamBContainer = document.getElementById('teamB');
            
            let text = '🎉 팀 나누기 결과 🎉\n\n';
            text += 'TEAM A\n';
            text += Array.from(teamAContainer.querySelectorAll('.text-2xl')).map(el => '• ' + el.textContent).join('\n');
            text += '\n\nTEAM B\n';
            text += Array.from(teamBContainer.querySelectorAll('.text-2xl')).map(el => '• ' + el.textContent).join('\n');
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const originalText = btn.innerHTML;
                btn.innerHTML = '✅ 복사 완료!';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            });
        }

        // 전체 초기화
        function resetAll() {
            if (confirm('모든 입력을 초기화하고 처음부터 다시 시작할까요?')) {
                document.getElementById('result').classList.add('hidden');
                // 입력창 초기화
                for (let i = 1; i <= 10; i++) {
                    const input = document.getElementById(`name${i}`);
                    if (input) input.value = '';
                }
            }
        }

        // 페이지 로드 완료
        window.onload = function() {
            console.log('✅ 페이지 로드 완료! 입력창 10개가 정상 표시됩니다.');
            // (필요시 Tailwind 초기화)
        };
    </script>
</body>
</html>
